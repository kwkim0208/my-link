<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footer" class="bg-dark text-white mt-5 py-4">
    <div class="container">
        <div class="row">

            <!-- 서비스 소개 + 로고 -->
            <div class="col-md-4 mb-3">
                <a th:href="@{/}" class="d-flex align-items-center gap-2 text-decoration-none mb-2">
                    <!-- 로고 이미지: /static/images/logo.png 에 파일 추가 후 사용 -->
                    <img th:src="@{/images/logo.svg}"
                         alt="로고"
                         width="32"
                         height="32"
                         class="rounded"
                         onerror="this.style.display='none'; document.getElementById('footerLogoIcon').style.display='inline';">
                    <!-- 로고 이미지 없을 때 아이콘 대체 -->
                    <span id="footerLogoIcon" style="display:none;">
                        <i class="bi bi-layers-fill text-white fs-5"></i>
                    </span>
                    <span class="fw-bold text-white fs-6">MyApp</span>
                </a>
                <p class="text-muted small mb-0">
                    Spring Boot + Thymeleaf 기반 풀스택 서비스입니다.
                </p>
            </div>

            <!-- 빠른 링크 -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold mb-2">바로가기</h6>
                <ul class="list-unstyled small">
                    <li><a th:href="@{/}" class="text-muted text-decoration-none">홈</a></li>
                    <li><a th:href="@{/board}" class="text-muted text-decoration-none">게시판</a></li>
                    <li><a th:href="@{/mypage/profile}" class="text-muted text-decoration-none">마이페이지</a></li>
                </ul>
            </div>

            <!-- 문의 / 정책 -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold mb-2">문의 및 정책</h6>
                <ul class="list-unstyled small">
                    <li><a href="#" class="text-muted text-decoration-none">이용약관</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">개인정보처리방침</a></li>
                    <li><a href="mailto:admin@myapp.com" class="text-muted text-decoration-none">
                        <i class="bi bi-envelope me-1"></i>admin@myapp.com
                    </a></li>
                </ul>
            </div>

        </div>

        <hr class="border-secondary">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <p class="text-muted small mb-0">
                &copy; <span id="currentYear"></span> MyApp. All rights reserved.
            </p>
            <div class="d-flex gap-3">
                <a href="#" class="text-muted fs-5"><i class="bi bi-github"></i></a>
                <a href="#" class="text-muted fs-5"><i class="bi bi-instagram"></i></a>
            </div>
        </div>
    </div>
</footer>

<script>
    // 연도 자동 갱신
    $('#currentYear').text(new Date().getFullYear());
</script>

</body>
</html>
